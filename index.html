<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<meta name="description" content="Ye Shin is a product designer at DoorDash in New York City.">
	<meta name="keywords" content="Ye Shin, Product Designer, Portfolio, New York City, Designer, Ye Heon Shin, DoorDash">

	<meta property="og:title" content="Ye Shin - Product Designer">
	<meta property="og:url" content="http://yayitsye.com/">
	<meta property="og:description" content="Ye Shin is a product designer at DoorDash in New York City.">
	<meta property="og:image" content="http://yayitsye.com/assets/images/meta/social-post-img.png"/>

	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="Ye Shin - Product Designer">
	<meta name="twitter:description" content="Ye Shin is a product designer at DoorDash in New York City.">

	<link rel="icon" type="image/png" href="assets/visuals/meta/icon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<title>Ye Shin - Product Designer</title>

	<style>
		@import url('https://api.fontshare.com/v2/css?f[]=satoshi@500&display=swap');

		*, *::before, *::after {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			padding: 0;
			height: 100%;
			background-color: #111;
		}

		body {
			display: grid;
			place-items: center;
			min-height: 100vh;
			padding: 40px;
		}

		p {
			font-family: 'Satoshi', sans-serif;
			font-weight: 500;
			font-size: 18px;
			line-height: 28px;
			color: #4d4d4d;
			max-width: 720px;
		}

		p a.name {
			color: #b4b4b4;
			cursor: pointer;
		}

		p a {
			color: #b4b4b4;
			text-decoration: none;
			transition: color 0.3s ease;
		}

		p a:hover {
			color: #e0e0e0;
		}

		@keyframes fadeOut {
			0% {
				-webkit-mask-position: 100% 100%;
				mask-position: 100% 100%;
			}
			100% {
				-webkit-mask-position: 0% 0%;
				mask-position: 0% 0%;
			}
		}

		p.fade-out {
			-webkit-mask-image: linear-gradient(135deg, transparent 40%, #000 50%);
			mask-image: linear-gradient(135deg, transparent 40%, #000 50%);
			-webkit-mask-size: 500% 500%;
			mask-size: 500% 500%;
			animation: fadeOut 1.5s ease-in forwards;
		}

		@keyframes revealFromTopLeft {
			0% {
				-webkit-mask-position: 100% 100%;
				mask-position: 100% 100%;
			}
			100% {
				-webkit-mask-position: 0% 0%;
				mask-position: 0% 0%;
			}
		}

		p {
			-webkit-mask-image: linear-gradient(135deg, #000 40%, transparent 50%);
			mask-image: linear-gradient(135deg, #000 40%, transparent 50%);
			-webkit-mask-size: 500% 500%;
			mask-size: 500% 500%;
			-webkit-mask-position: 100% 100%;
			mask-position: 100% 100%;
			animation: revealFromTopLeft 3s ease-out 0.3s forwards;
		}
	</style>
</head>
<body>
	<p><a class="name" href="/">Ye Shin</a> is in NYC building things at <a href="https://www.doordash.com/" target="_blank">DoorDash</a>. Previously at <a href="https://www.betterment.com/" target="_blank">Betterment</a>, <a href="https://www.meetup.com/" target="_blank">Meetup</a>, and <a href="https://oak.is/" target="_blank">Oak Studios</a>. For better or for worse, this site is currently being rebuilt. In the meantime, reach out through <a href="mailto:yeshin316@gmail.com">email</a>.</p>

	<script>
		document.querySelector('a.name').addEventListener('click', (e) => {
			e.preventDefault();
			const dest = e.currentTarget.href;
			const p = document.querySelector('p');
			p.classList.add('fade-out');
			p.addEventListener('animationend', () => {
				window.location.reload();
			});
		});
	</script>
</body>
</html>
