<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="Ye Shin is a product designer at DoorDash in New York City."><meta name="keywords" content="Ye Shin, Product Designer, Portfolio, New York City, Designer, Ye Heon Shin, DoorDash"><meta property="og:title" content="Ye Shin - Product Designer"><meta property="og:url" content="http://yayitsye.com/"><meta property="og:description" content="Ye Shin is a product designer at DoorDash in New York City."><meta property="og:image" content="http://yayitsye.com/assets/images/meta/social-post-img.png"/><meta name="twitter:card" content="summary"><meta name="twitter:title" content="Ye Shin - Product Designer"><meta name="twitter:description" content="Ye Shin is a product designer at DoorDash in New York City."><link rel="icon" type="image/png" href="assets/visuals/meta/icon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><title>Ye Shin - Product Designer</title><style>@import url('https://api.fontshare.com/v2/css?f[]=satoshi@500&display=swap');*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html,body{margin:0;padding:0;height:100%;background-color:#111;cursor:none;overflow:hidden}::selection{background:transparent;color:inherit;text-decoration-line:underline;text-decoration-style:dotted;text-decoration-color:rgba(255,255,255,.55);text-decoration-thickness:2px;text-underline-offset:5px;text-decoration-skip-ink:none}::-moz-selection{background:transparent;color:inherit;text-decoration-line:underline;text-decoration-style:dotted;text-decoration-color:rgba(255,255,255,.55);text-decoration-thickness:2px;text-underline-offset:5px;text-decoration-skip-ink:none}a{cursor:none}#cursor{position:fixed;top:0;left:0;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:#fff;pointer-events:none;translate:-100px -100px;scale:1;opacity:1;transition:scale .35s cubic-bezier(.5,0,.3,1),opacity .12s ease-out;z-index:10000;will-change:translate,scale}#cursor.absorbed{scale:0;opacity:0;transition:opacity 0s,scale .35s cubic-bezier(.5,0,.3,1)}body{display:grid;place-items:center;min-height:100dvh;padding:40px}p{position:relative;font-family:'Satoshi',sans-serif;font-weight:500;font-size:18px;line-height:28px;color:#4d4d4d;max-width:720px;-webkit-mask-image:linear-gradient(135deg,#000 40%,transparent 50%);mask-image:linear-gradient(135deg,#000 40%,transparent 50%);-webkit-mask-size:500% 500%;mask-size:500% 500%;-webkit-mask-position:100% 100%;mask-position:100% 100%;animation:revealCover 2s ease-out .3s forwards}@keyframes revealCover{0%{-webkit-mask-position:100% 100%;mask-position:100% 100%}100%{-webkit-mask-position:0% 0%;mask-position:0% 0%}}p a,p a.name{color:#b4b4b4;text-decoration:none;transition:color .35s ease,text-shadow .35s ease}p a:hover,p a.name:hover{color:#fff;text-shadow:0 0 4px rgba(255,255,255,.35),0 0 12px rgba(255,255,255,.18),0 0 28px rgba(255,255,255,.1)}@keyframes fadeOut{0%{-webkit-mask-position:100% 100%;mask-position:100% 100%}100%{-webkit-mask-position:0% 0%;mask-position:0% 0%}}p.fade-out{-webkit-mask-image:linear-gradient(135deg,transparent 40%,#000 50%);mask-image:linear-gradient(135deg,transparent 40%,#000 50%);animation:fadeOut 1.5s ease-in forwards}canvas#trail{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999}@media(max-width:600px){body{padding:24px}canvas#trail{display:none}}</style></head><body><p><a class="name" href="/">Ye Shin</a> is in NYC building things at <a href="https://www.doordash.com/" target="_blank">DoorDash</a>. Previously at <a href="https://www.betterment.com/" target="_blank">Betterment</a>, <a href="https://www.meetup.com/" target="_blank">Meetup</a>, and <a href="https://oak.is/" target="_blank">Oak Studios</a>. For better or for worse, this site is currently being rebuilt. In the meantime, reach out through <a href="mailto:yeshin316@gmail.com">email</a>.</p><canvas id="trail"></canvas><div id="cursor"></div><script>(function(){const cur=document.getElementById('cursor');addEventListener('mousemove',e=>{cur.style.translate=e.clientX+'px '+e.clientY+'px'});document.querySelectorAll('a').forEach(a=>{a.addEventListener('mouseenter',()=>{cur.classList.add('absorbed');document.body.classList.add('over-link')});a.addEventListener('mouseleave',()=>{cur.classList.remove('absorbed');document.body.classList.remove('over-link')})});const para=document.querySelector('p');para.addEventListener('animationend',function done(e){if(e.animationName!=='revealCover')return;para.classList.add('revealed');para.removeEventListener('animationend',done)})})();</script><script>document.querySelector('a.name').addEventListener('click',(e)=>{e.preventDefault();const p=document.querySelector('p');p.classList.add('revealed','fade-out');p.addEventListener('animationend',(ev)=>{if(ev.animationName==='fadeOut')window.location.reload()},{once:true})});(function(){const c=document.getElementById('trail');const ctx=c.getContext('2d');let dpr=window.devicePixelRatio||1;function resize(){dpr=window.devicePixelRatio||1;c.width=innerWidth*dpr;c.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}resize();addEventListener('resize',resize);const points=[];let mx=-100,my=-100,hasMoved=false;addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;hasMoved=true});addEventListener('mouseleave',()=>{hasMoved=false});function tick(){ctx.clearRect(0,0,innerWidth,innerHeight);if(hasMoved&&!document.body.classList.contains('over-link')){points.push({x:mx,y:my,life:1})}for(let i=points.length-1;i>=0;i--){const p=points[i];p.life-=0.05;if(p.life<=0){points.splice(i,1);continue}const r=p.life*3.2;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(p.life*0.55)+')';ctx.fill()}requestAnimationFrame(tick)}tick()})();</script></body></html>
