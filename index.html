;height:100%;pointer-events:none;z-index:9998}@media(max-width:600px){body{padding:24px}#cursor{display:none}}@media(hover:none) and (pointer:coarse){#cursor{display:none}html,body{cursor:auto}a{cursor:pointer}}</style></head><body><p><a class="name" href="/">Ye Shin</a> is in NYC building things at <a href="https://www.doordash.com/" target="_blank">DoorDash</a>. Previously at <a href="https://www.betterment.com/" target="_blank">Betterment</a>, <a href="https://www.meetup.com/" target="_blank">Meetup</a>, and <a href="https://oak.is/" target="_blank">Oak Studios</a>. For better or for worse, this site is currently being rebuilt. In the meantime, reach out through <a href="mailto:yeshin316@gmail.com">email</a>.</p><canvas id="trail"></canvas><canvas id="grid-reveal"></canvas><div id="cursor"></div><script>(function(){const c=document.getElementById('grid-reveal');if(!c)return;const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;const W=innerWidth,H=innerHeight;c.width=W*dpr;c.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);document.body.style.backgroundImage='none';const GRID=40,LINE_A=0.015,CROSS_A=0.02;const N=8,seeds=[];for(let i=0;i<N;i++)seeds.push({x:Math.random()*W,y:Math.random()*H});const lines=[];let maxD=0;for(let y=-1;y<H+GRID;y+=GRID){let md=Infinity,cx=W/2;for(const s of seeds){const d=Math.abs(y-s.y);if(d<md){md=d;cx=s.x}}if(md>maxD)maxD=md;lines.push({h:1,pos:y,c:cx,d:md,L:W})}for(let x=-1;x<W+GRID;x+=GRID){let md=Infinity,cy=H/2;for(const s of seeds){const d=Math.abs(x-s.x);if(d<md){md=d;cy=s.y}}if(md>maxD)maxD=md;lines.push({h:0,pos:x,c:cy,d:md,L:H})}const crosses=[];let maxDC=0;for(let cx=39.5;cx<W;cx+=GRID)for(let cy=39.5;cy<H;cy+=GRID){let md=Infinity;for(const s of seeds){const d=Math.hypot(cx-s.x,cy-s.y);if(d<md)md=d}if(md>maxDC)maxDC=md;crosses.push({x:cx,y:cy,d:md})}const maxAll=Math.max(maxD,maxDC);const DELAY=500,TOTAL=2000,GROW=480,CGROW=300,start=performance.now()+DELAY;function frame(now){const dt=now-start;if(dt<0){requestAnimationFrame(frame);return}ctx.clearRect(0,0,W,H);ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,'+LINE_A+')';for(const ln of lines){const t0=(ln.d/maxAll)*(TOTAL-GROW);const p=Math.min(1,Math.max(0,(dt-t0)/GROW));if(p<=0)continue;const e=1-Math.pow(1-p,3);const half=e*Math.max(ln.c,ln.L-ln.c);const a=Math.max(0,ln.c-half),b=Math.min(ln.L,ln.c+half);ctx.beginPath();if(ln.h){ctx.moveTo(a,ln.pos+0.5);ctx.lineTo(b,ln.pos+0.5)}else{ctx.moveTo(ln.pos+0.5,a);ctx.lineTo(ln.pos+0.5,b)}ctx.stroke()}ctx.lineWidth=1.5;for(const cr of crosses){const t0=(cr.d/maxAll)*(TOTAL-CGROW);const p=Math.min(1,Math.max(0,(dt-t0)/CGROW));if(p<=0)continue;const e=1-Math.pow(1-p,3);ctx.strokeStyle='rgba(255,255,255,'+(e*CROSS_A)+')';ctx.beginPath();ctx.moveTo(cr.x-4.5,cr.y);ctx.lineTo(cr.x+4.5,cr.y);ctx.moveTo(cr.x,cr.y-4.5);ctx.lineTo(cr.x,cr.y+4.5);ctx.stroke()}if(dt<TOTAL)requestAnimationFrame(frame);else{document.body.style.backgroundImage='';c.remove()}}requestAnimationFrame(frame)})();(function(){const cur=document.getElementById('cursor');addEventListener('mousemove',e=>{cur.style.translate=e.clientX+'px '+e.clientY+'px'});document.querySelectorAll('a').forEach(a=>{a.addEventListener('mouseenter',()=>{cur.classList.add('absorbed');document.body.classList.add('over-link')});a.addEventListener('mouseleave',()=>{cur.classList.remove('absorbed');document.body.classList.remove('over-link')})});const para=document.querySelector('p');para.addEventListener('animationend',function done(e){if(e.animationName!=='revealCover')return;para.classList.add('revealed');para.removeEventListener('animationend',done)})})();</script><script>document.querySelector('a.name').addEventListener('click',(e)=>{e.preventDefault();const p=document.querySelector('p');p.classList.add('revealed','fade-out');(function(){let c=document.getElementById('grid-reveal');if(!c){c=document.createElement('canvas');c.id='grid-reveal';document.body.appendChild(c)}const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;const W=innerWidth,H=innerHeight;c.width=W*dpr;c.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);c.style.opacity='1';document.body.style.backgroundImage='none';const GRID=40,LINE_A=0.015,CROSS_A=0.02;const N=8,seeds=[];for(let i=0;i<N;i++)seeds.push({x:Math.random()*W,y:Math.random()*H});const lines=[];let maxD=0;for(let y=-1;y<H+GRID;y+=GRID){let md=Infinity,cx=W/2;for(const s of seeds){const d=Math.abs(y-s.y);if(d<md){md=d;cx=s.x}}if(md>maxD)maxD=md;lines.push({h:1,pos:y,c:cx,d:md,L:W})}for(let x=-1;x<W+GRID;x+=GRID){let md=Infinity,cy=H/2;for(const s of seeds){const d=Math.abs(x-s.x);if(d<md){md=d;cy=s.y}}if(md>maxD)maxD=md;lines.push({h:0,pos:x,c:cy,d:md,L:H})}const crosses=[];let maxDC=0;for(let cx=39.5;cx<W;cx+=GRID)for(let cy=39.5;cy<H;cy+=GRID){let md=Infinity;for(const s of seeds){const d=Math.hypot(cx-s.x,cy-s.y);if(d<md)md=d}if(md>maxDC)maxDC=md;crosses.push({x:cx,y:cy,d:md})}const maxAll=Math.max(maxD,maxDC);const DELAY=200,TOTAL=2000,GROW=480,CGROW=300,start=performance.now()+DELAY;function frame(now){const dt=now-start;ctx.clearRect(0,0,W,H);ctx.lineWidth=1;ctx.strokeStyle='rgba(255,255,255,'+LINE_A+')';for(const ln of lines){const t0=(1-ln.d/maxAll)*(TOTAL-GROW);const p=Math.min(1,Math.max(0,(dt-t0)/GROW));if(p>=1)continue;const e=p*p*p;const half=(1-e)*Math.max(ln.c,ln.L-ln.c);const a=Math.max(0,ln.c-half),b=Math.min(ln.L,ln.c+half);ctx.beginPath();if(ln.h){ctx.moveTo(a,ln.pos+0.5);ctx.lineTo(b,ln.pos+0.5)}else{ctx.moveTo(ln.pos+0.5,a);ctx.lineTo(ln.pos+0.5,b)}ctx.stroke()}ctx.lineWidth=1.5;for(const cr of crosses){const t0=(1-cr.d/maxAll)*(TOTAL-CGROW);const p=Math.min(1,Math.max(0,(dt-t0)/CGROW));if(p>=1)continue;const e=p*p*p;ctx.strokeStyle='rgba(255,255,255,'+((1-e)*CROSS_A)+')';ctx.beginPath();ctx.moveTo(cr.x-4.5,cr.y);ctx.lineTo(cr.x+4.5,cr.y);ctx.moveTo(cr.x,cr.y-4.5);ctx.lineTo(cr.x,cr.y+4.5);ctx.stroke()}if(dt<TOTAL)requestAnimationFrame(frame);else window.location.reload()}requestAnimationFrame(frame)})()});(function(){const c=document.getElementById('trail');const ctx=c.getContext('2d');let dpr=window.devicePixelRatio||1;function resize(){dpr=window.devicePixelRatio||1;c.width=innerWidth*dpr;c.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}resize();addEventListener('resize',resize);const points=[];let mx=-100,my=-100,hasMoved=false;const isTouch=matchMedia('(hover:none) and (pointer:coarse)').matches;if(!isTouch){addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;hasMoved=true});addEventListener('mouseleave',()=>{hasMoved=false})}const GRID=40,RADIUS=50,MAX_A=0.25,FADE=0.008,RDUR=30,RMAX=260,RFADE=0.033;const lit=new Map();const ripples=[];addEventListener('pointerdown',e=>{ripples.push({x:e.clientX,y:e.clientY,t:0})});function tick(){ctx.clearRect(0,0,innerWidth,innerHeight);for(let i=ripples.length-1;i>=0;i--){const r=ripples[i];r.t+=1;if(r.t>RDUR+25){ripples.splice(i,1);continue}const lead=r.t/RDUR*RMAX;if(lead>0&&lead<RMAX){const band=22,inR=lead-band,ouR=lead+6,gx0=Math.floor((r.x-ouR+1)/GRID),gx1=Math.floor((r.x+ouR+1)/GRID),gy0=Math.floor((r.y-ouR+1)/GRID),gy1=Math.floor((r.y+ouR+1)/GRID);for(let gx=gx0;gx<=gx1;gx++)for(let gy=gy0;gy<=gy1;gy++){const ix=-1+GRID*gx,iy=-1+GRID*gy,d=Math.hypot(ix-r.x,iy-r.y);if(d<inR||d>ouR)continue;const proximity=Math.max(0,1-Math.abs(d-lead)/band),k=gx+','+gy,prev=lit.get(k);if(!prev||prev.life<proximity)lit.set(k,{x:ix,y:iy,life:proximity,fade:RFADE})}}}if(hasMoved&&!document.body.classList.contains('over-link')){points.push({x:mx,y:my,life:1})}for(let i=points.length-1;i>=0;i--){const p=points[i];p.life-=0.05;if(p.life<=0){points.splice(i,1);continue}const r=p.life*3.2;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(p.life*0.55)+')';ctx.fill()}if(hasMoved&&!document.body.classList.contains('over-link')){const gx0=Math.floor((mx-RADIUS+1)/GRID),gx1=Math.floor((mx+RADIUS+1)/GRID),gy0=Math.floor((my-RADIUS+1)/GRID),gy1=Math.floor((my+RADIUS+1)/GRID);for(let gx=gx0;gx<=gx1;gx++){for(let gy=gy0;gy<=gy1;gy++){const ix=-1+GRID*gx,iy=-1+GRID*gy,d=Math.hypot(ix-mx,iy-my);if(d>RADIUS)continue;const proximity=1-d/RADIUS,k=gx+','+gy,prev=lit.get(k);if(!prev||prev.life<proximity)lit.set(k,{x:ix,y:iy,life:proximity,fade:FADE})}}}ctx.lineWidth=1.5;ctx.lineCap='butt';for(const[k,v]of lit){v.life-=v.fade;if(v.life<=0){lit.delete(k);continue}const a=Math.sqrt(v.life)*MAX_A;ctx.strokeStyle='rgba(255,255,255,'+a+')';ctx.beginPath();ctx.moveTo(v.x-4.5,v.y);ctx.lineTo(v.x+4.5,v.y);ctx.moveTo(v.x,v.y-4.5);ctx.lineTo(v.x,v.y+4.5);ctx.stroke()}requestAnimationFrame(tick)}tick()})();</script></body></html>
